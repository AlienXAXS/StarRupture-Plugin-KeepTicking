name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.3) -- leave blank to auto-increment'
        type: string
        default: ''

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Checkout Plugin SDK
        uses: actions/checkout@v4
        with:
          repository: AlienXAXS/StarRupture-Plugin-SDK
          path: plugin-sdk

      - name: Checkout Game SDK
        uses: actions/checkout@v4
        with:
          repository: AlienXAXS/StarRupture-Game-SDK
          path: game-sdk
          submodules: true

      - name: Generate release tag
        id: tag
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          function Parse-Semver([string]$v) {
            if ($v -match '^v?(\d+)\.(\d+)\.(\d+)$') {
              return @{ Major = [int]$Matches[1]; Minor = [int]$Matches[2]; Patch = [int]$Matches[3] }
            }
            return $null
          }
          function Compare-Semver($a, $b) {
            if ($a.Major -ne $b.Major) { return ($a.Major -gt $b.Major) ? 1 : -1 }
            if ($a.Minor -ne $b.Minor) { return ($a.Minor -gt $b.Minor) ? 1 : -1 }
            if ($a.Patch -ne $b.Patch) { return ($a.Patch -gt $b.Patch) ? 1 : -1 }
            return 0
          }
          function Format-Semver($v) { return "v$($v.Major).$($v.Minor).$($v.Patch)" }

          $latestParsed = $null
          $releaseTags = gh release list --limit 100 --json tagName |
            ConvertFrom-Json | Select-Object -ExpandProperty tagName |
            Where-Object { $_ -match '^v\d+\.\d+\.\d+$' }
          foreach ($t in $releaseTags) {
            $p = Parse-Semver $t
            if ($p -and ($latestParsed -eq $null -or (Compare-Semver $p $latestParsed) -gt 0)) { $latestParsed = $p }
          }
          if ($latestParsed -eq $null) { $latestParsed = @{ Major = 0; Minor = 0; Patch = 0 } }

          $autoParsed = @{ Major = $latestParsed.Major; Minor = $latestParsed.Minor + 1; Patch = 0 }

          $inputParsed = $null
          $inputVersion = "${{ github.event.inputs.version }}".Trim()
          if ($inputVersion -ne '') { $inputParsed = Parse-Semver $inputVersion }

          $chosen = if ($inputParsed) { $inputParsed } else { $autoParsed }
          $tag = Format-Semver $chosen
          $nexusVersion = $tag.TrimStart('v')
          Write-Host "Tag: $tag  Nexus version: $nexusVersion"
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT
          echo "NEXUS_VERSION=$nexusVersion" >> $env:GITHUB_OUTPUT

      - name: Build Client Release
        run: |
          msbuild "KeepTicking_Plugin.sln" `
            /p:Configuration="Release" `
            /p:Platform=x64 `
            /p:PostBuildEventUseInBuild=false `
            /p:GameSDKRoot="${{ github.workspace }}\game-sdk" `
            /p:PluginSDKInclude="${{ github.workspace }}\plugin-sdk\include" `
            /p:StarRuptureSDKConfigDir="${{ github.workspace }}\game-sdk\Server\;${{ github.workspace }}\game-sdk\Server\SDK\" `
            /m /v:minimal

      - name: Build Server Release
        run: |
          msbuild "KeepTicking_Plugin.sln" `
            /p:Configuration="Server Release" `
            /p:Platform=x64 `
            /p:PostBuildEventUseInBuild=false `
            /p:GameSDKRoot="${{ github.workspace }}\game-sdk" `
            /p:PluginSDKInclude="${{ github.workspace }}\plugin-sdk\include" `
            /m /v:minimal
      - name: Package ZIPs
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          $ws  = $env:GITHUB_WORKSPACE
          $stagingClient = "$ws\staging\Client"
          New-Item -ItemType Directory -Force $stagingClient | Out-Null
          Copy-Item "build\Release\Plugins\KeepTicking.dll" "$stagingClient\KeepTicking.dll"
          Compress-Archive -Path "$stagingClient\*" -DestinationPath "$ws\KeepTicking-Client-$tag.zip"
          $stagingServer = "$ws\staging\Server"
          New-Item -ItemType Directory -Force $stagingServer | Out-Null
          Copy-Item "build\Server Release\Plugins\KeepTicking.dll" "$stagingServer\KeepTicking.dll"
          Compress-Archive -Path "$stagingServer\*" -DestinationPath "$ws\KeepTicking-Server-$tag.zip"
          Write-Host "Packaged KeepTicking"

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.tag.outputs.TAG }}"
          $ws  = $env:GITHUB_WORKSPACE
          gh release create $tag `
            "$ws\KeepTicking-Client-$tag.zip" `
            "$ws\KeepTicking-Server-$tag.zip" `
            --title "KeepTicking $tag" `
            --generate-notes

      - name: Upload Client build to Nexus Mods
        uses: Nexus-Mods/upload-action@main
        with:
          api_key: ${{ secrets.NEXUS_APIKEY }}
          file_group_id: ${{ secrets.NEXUS_CLIENT_GROUP_ID }}
          filename: ${{ github.workspace }}\KeepTicking-Client-${{ steps.tag.outputs.TAG }}.zip
          archive_existing_file: true
          allow_mod_manager_download: false
          display_name: "KeepTicking Client ${{ steps.tag.outputs.TAG }}"
          description: "Changelog: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.TAG }}"
          version: ${{ steps.tag.outputs.NEXUS_VERSION }}

      - name: Upload Server build to Nexus Mods
        uses: Nexus-Mods/upload-action@main
        with:
          api_key: ${{ secrets.NEXUS_APIKEY }}
          file_group_id: ${{ secrets.NEXUS_SERVER_GROUP_ID }}
          filename: ${{ github.workspace }}\KeepTicking-Server-${{ steps.tag.outputs.TAG }}.zip
          archive_existing_file: true
          allow_mod_manager_download: false
          display_name: "KeepTicking Server ${{ steps.tag.outputs.TAG }}"
          description: "Changelog: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.TAG }}"
          version: ${{ steps.tag.outputs.NEXUS_VERSION }}
